name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! The more detail you provide, the faster we can help.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue clearly. What did you expect vs what actually happened?
      placeholder: "When I send a message in my Discord channel, the bot doesn't respond..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger this issue, starting from a clean state.
      placeholder: |
        1. Sent "@Kai hello" in #research channel
        2. Bot showed typing indicator but never replied
        3. Checked logs, saw error below
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Which channel(s) are affected?
      multiple: true
      options:
        - Discord
        - Telegram
        - WhatsApp
        - All channels
        - Not channel-specific
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is involved?
      options:
        - Bot / messaging (send/receive)
        - Agent container (spawning, execution)
        - Agent Swarm / Teams
        - Skills (container skills, slash commands)
        - IPC (inter-process communication)
        - Scheduled tasks / cron
        - Setup / installation
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant logs. Check these sources:
        - Host logs: `tail -50 logs/bastionclaw.log`
        - Container logs: `tail -50 groups/{folder}/logs/latest.log`
        - Running containers: `container list`
      render: shell
      placeholder: |
        [10:24:12.928] INFO: Discord message stored
          chatJid: "dc:1476600043535339793"
        [10:24:13.001] ERROR: Container spawn failed
          err: "timeout exceeded"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run the following and paste the output:
        ```bash
        echo "OS: $(uname -s) $(uname -r)"
        echo "Node: $(node --version)"
        echo "BastionClaw: $(node -p "require('./package.json').version")"
        echo "Channels:" && grep -E "^(DISCORD_BOT_TOKEN|TELEGRAM_BOT_TOKEN|WHATSAPP)=" .env | sed 's/=.*/=configured/'
        echo "Groups:" && sqlite3 store/messages.db "SELECT jid, name, folder FROM registered_groups" 2>/dev/null
        ```
      render: shell
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: |
        Any relevant config — registered groups, container_config, CLAUDE.md snippets, skill files.
        **Do NOT paste tokens, API keys, or webhook URLs.**
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, error messages, or anything else that might help.
    validations:
      required: false
